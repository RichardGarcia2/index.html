<script>

        // 4. CHUVA DE CORAÇÕES E VIOLINOS
        setInterval(() => {
            const elemento = document.createElement("div");

            // Lógica para escolher aleatoriamente entre Coração e Violino
            // Math.random() gera um número entre 0 e 1.
            // Se for maior que 0.5 (50% de chance), é Violino. Se não, é Coração.
            if (Math.random() > 0.5) {
                elemento.innerHTML = "🎻"; // Violino
            } else {
                elemento.innerHTML = "💖"; // Coração
            }

            // Estilos para fazer os elementos caírem (Mantido o original, com pequenos ajustes)
            elemento.style.position = "fixed";
            elemento.style.left = Math.random() * 100 + "vw"; // Posição horizontal aleatória
            elemento.style.top = "-30px"; // Começa um pouco acima da tela
            elemento.style.fontSize = "25px"; // Aumentei um pouquinho o tamanho para o violino aparecer melhor
            elemento.style.zIndex = "1000"; // Garante que fique por cima de tudo
            elemento.style.pointerEvents = "none"; // Impede que o ícone atrapalhe os cliques na página

            // Define a animação (o nome da animação deve ser o mesmo do seu CSS, ex: 'fall')
            elemento.style.animation = "fall 5s linear forwards";

            // Adiciona o elemento ao corpo da página
            document.body.appendChild(elemento);

            // Remove o elemento da página após 5 segundos para não pesar
            setTimeout(() => elemento.remove(), 5000);

        }, 400); // Diminuí o tempo para 400ms para a chuva ficar um pouco mais densa

</script>



<script>
const dataInicio = new Date("2025-12-15");

function atualizarContador() {
    const agora = new Date();
    const diff = agora - dataInicio;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor(diff / (1000 * 60 * 60) % 24);
    const minutos = Math.floor(diff / (1000 * 60) % 60);
    const segundos = Math.floor(diff / 1000 % 60);

    document.getElementById("contador").innerText =
        `Estamos juntos há ${dias} dias, ${horas}h ${minutos}m ${segundos}s 💖`;
}

setInterval(atualizarContador, 1000);

function mostrarMais() {
    var info = document.getElementById("info-extra");
    
    // Se estiver escondido, mostra. Se estiver aparecendo, esconde.
    if (info.style.display === "none") {
        info.style.display = "block";
    } else {
        info.style.display = "none";
    }
}

 

</script>
